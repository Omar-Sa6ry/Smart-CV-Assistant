mutation {
  createLanguage(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      proficiency: professional
      name: "English"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      proficiency
      createdAt
      user {
        firstName
        email
      }
      cv {
        id
        title
      }
    }
  }
}

