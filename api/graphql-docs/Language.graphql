mutation {
  createLanguage(
    data: {
      cvId: "4db5de61-da92-42e8-9d55-d1d93377ced8"
      proficiency: professional
      name: "Arabicc"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      proficiency
      createdAt
      user {
        firstName
        email
      }
      cv {
        id
        title
      }
    }
  }
}

