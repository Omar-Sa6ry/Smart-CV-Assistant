mutation {
  createSkill(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      name: "nest.js"
      proficiency: intermediate
    }
  ) {
    message
    success
    statusCode
    timeStamp
    data {
      id
      name
      proficiency
      createdAt
      keyword {
        id
        name
        category
        isVerified
        popularityScore
        createdAt
      }
      user {
        firstName
        email
      }
      cv {
        title
        id
      }
    }
  }
}

