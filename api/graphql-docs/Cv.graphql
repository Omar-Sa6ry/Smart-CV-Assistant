query {
  getUserCvs(pagination: { page: 1, limit: 100 }) {
    message
    success
    statusCode
    timeStamp
    pagination {
      totalPages
      totalItems
      currentPage
    }
    items {
      id
      title
      isDefault
      summary
      user {
        id
        firstName
        lastName
        email
      }
    }
  }
}

