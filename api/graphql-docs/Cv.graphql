mutation {
  createCv(
    data: {
      title: "Omar"
      isDefault: true
      location: "Damietta, Egypt"
      headline: "Backend Developer"
      phone: "01091854368"
      summary: "Backend Developer with 2+ years of experience architecting high-performance web applications using Node.js, NestJS, Goand PostgreSQL. Engineered scalable microservices and GraphQL APIs that accommodate 10k+ concurrent users, while reducing query latency by 40% utilizing Redis and BullMQ. Delivered secure, ACID-compliant databases and real-time WebSocket integrations, strictly adhering to Clean Architecture guidelines for production-ready solutions"
    }
  ) {
    message
    success
    statusCode
    timeStamp
    data {
      id
      title
      isDefault
      summary
      user {
        id
        firstName
        lastName
        email
      }
    }
  }
}

query {
  getCvById(id: "eddb4d01-7c09-4968-b174-8bc9e21ee97f") {
