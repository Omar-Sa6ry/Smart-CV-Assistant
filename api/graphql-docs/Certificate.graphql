mutation {
  createCertification(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      name: "gRPC [Golang] Master Class: Build Modern API & Microservices"
      issuingOrganization: "udemy"
      credentialId: "klkjhjuio"
      credentialUrl: "https://tamooh.cloud/"
      issueDate: "5-10-2025"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      issuingOrganization
      credentialId
      credentialUrl
      issueDate
      createdAt
      user {
        firstName
        email
      }
      cv {
        id
        title
        summary
      }
    }
  }
}

