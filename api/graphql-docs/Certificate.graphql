mutation {
  createCertification(
    data: {
      cvId: "4db5de61-da92-42e8-9d55-d1d93377ced8"
      name: "gRPC [Golang] Master Class: Build Modern API & Microservices"
      issuingOrganization: "udemy"
      credentialId: "klkjhjuio"
      credentialUrl: "https://tamooh.cloud/"
      issueDate: "5-10-2025"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      issuingOrganization
      credentialId
      credentialUrl
      issueDate
      createdAt
      user {
        firstName
        email
      }
      cv {
        id
        title
        summary
      }
    }
  }
}

