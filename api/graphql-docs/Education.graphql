mutation {
  createEducation(
    data: {
      cvId: "4db5de61-da92-42e8-9d55-d1d93377ced8"
      institution: "Damietta unversity"
      title: "Bachelor of Computer Science and Artificial Intelligence"
      location: "Damieta, university"
      description: "Bachelor of Computer Science and Artificial Intelligence"
      degree: bachelor
      isCurrent: true
      startDate: "1-10-2022"
      gpa: 3.5
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      isCurrent
      institution
      title
      description
      degree
      gpa
      startDate
      endDate
      createdAt
      user {
        firstName
        lastName
      }
      cv {
        id
        title
      }
    }
  }
}

