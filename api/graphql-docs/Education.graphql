mutation {
  createEducation(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      institution: "Damietta unversity"
      title: "Bachelor of Computer Science and Artificial Intelligence"
      location: "Damieta, university"
      description: "Bachelor of Computer Science and Artificial Intelligence"
      degree: bachelor
      isCurrent: true
      startDate: "1-10-2022"
      gpa: 3.5
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      isCurrent
      institution
      title
      description
      degree
      gpa
      startDate
      endDate
      createdAt
      user {
        firstName
        lastName
      }
      cv {
        id
        title
      }
    }
  }
}

