mutation {
  createProject(
    data: {
      cvId: "4db5de61-da92-42e8-9d55-d1d93377ced8"
      name: "bidding"
      description: ""
      technologiesUsed: "nestjs microservice"
      teamSize: 1
      projectUrl: "https://tamooh.cloud/"
      isTeamProject: false
      isPersonalProject: true
      startDate: "3-3-2025"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      description
      descriptionBullets
      technologiesUsed
      projectUrl
      isPersonalProject
      isTeamProject
      startDate
      endDate
      teamSize
      user {
        firstName
        email
      }
      cv {
        id
        title
      }
    }
  }
}

mutation {
  deleteProject(id: "a371f088-3d17-469d-89b7-b9fb6e064d62") {
    message
    timeStamp
    success
    statusCode
  }
}

