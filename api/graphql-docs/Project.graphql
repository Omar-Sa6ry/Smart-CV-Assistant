mutation {
  createProject(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      name: "bidding"
      description: "rgt"
      projectUrl: "https://tamooh.cloud/"
      startDate: "3-3-2025"
    }
  ) {
    message
    success
    timeStamp
    statusCode
    data {
      id
      name
      description
      descriptionBullets
      projectUrl
      startDate
      endDate
      user {
        firstName
        email
      }
      cv {
        id
        title
      }
    }
  }
}

mutation {
  deleteProject(id: "67e76b6b-a752-4980-acd5-bef0b943d580") {
