mutation {
  createExperience(
    data: {
      cvId: "4db5de61-da92-42e8-9d55-d1d93377ced8"
      jobTitle: "Backend Developer"
      companyName: "tamooh"
      companyWebsite: "https://tamooh.cloud/"
      location: "Portaid, Egypt"
      startDate: "2025-10-01"
      isCurrentJob: true
      employmentType: full_time
      description: "Led the development of microservices.\nManaged a team of 5 developers.\nImplemented GraphQL DataLoaders."
    }
  ) {
    statusCode
    message
    success
    timeStamp
    data {
      id
      jobTitle
      companyName
      description
      descriptionBullets
      startDate
      endDate
      employmentType
      achievements
      companyWebsite
      location
      isCurrentJob
      createdAt
      user {
        firstName
        email
      }
      cv {
        title
        summary
        isDefault
      }
    }
  }
}

