mutation {
  createExperience(
    data: {
      cvId: "eddb4d01-7c09-4968-b174-8bc9e21ee97f"
      jobTitle: "Backend Developer"
      companyName: "tamooh"
      companyWebsite: "https://tamooh.cloud/"
      location: "Portaid, Egypt"
      startDate: "2025-10-01"
      isCurrentJob: true
      employmentType: full_time
      description: "Led the development of microservices.\nManaged a team of 5 developers.\nImplemented GraphQL DataLoaders."
    }
  ) {
    statusCode
    message
    success
    timeStamp
    data {
      id
      jobTitle
      companyName
      description
      descriptionBullets
      startDate
      endDate
      employmentType
      companyWebsite
      location
      isCurrentJob
      createdAt
      user {
        firstName
        email
      }
      cv {
        title
        summary
        isDefault
      }
    }
  }
}

